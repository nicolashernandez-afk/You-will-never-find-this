<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Unblocked Player</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #121212; color: #fff; margin: 0; }
        .container { background: #1e1e1e; padding: 30px; border-radius: 12px; width: 90%; max-width: 700px; text-align: center; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #444; border-radius: 6px; background: #222; color: #fff; box-sizing: border-box; }
        .main-btn { width: 100%; padding: 12px; background: #ff0000; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .mirror-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .alt-btn { padding: 8px; background: #333; color: #bbb; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-size: 0.8em; }
        #video-wrap { margin-top: 20px; width: 100%; aspect-ratio: 16/9; display: none; background: #000; border-radius: 6px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        #status { font-size: 0.8em; color: #888; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="color:#ff0000">Smart Video Player</h2>
        <input type="text" id="videoUrl" placeholder="Paste link (YouTube, Shorts, or just the ID)">
        
        <button class="main-btn" onclick="startPlay('vid.puffyan.us')">▶ Load Video</button>
        
        <div class="mirror-grid">
            <button class="alt-btn" onclick="startPlay('inv.tux.pizza')">Try Mirror A</button>
            <button class="alt-btn" onclick="startPlay('invidious.projectsegfau.lt')">Try Mirror B</button>
            <button class="alt-btn" onclick="startPlay('iv.melmac.space')">Try Mirror C</button>
            <button class="alt-btn" onclick="startPlay('invidious.nerdvpn.de')">Try Mirror D</button>
        </div>

        <div id="video-wrap">
            <iframe id="player" allowfullscreen></iframe>
        </div>
        <p id="status">Status: Waiting for link...</p>
    </div>

    <script>
        function extractVideoID(url) {
            // New "Bulletproof" Regex: looks for 11 chars after common YT patterns
            const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/;
            const match = url.match(regex);
            
            if (match) return match[1];
            
            // Fallback: If they just paste the 11-char ID directly
            if (url.length === 11) return url;
            
            return null;
        }

        function startPlay(domain) {
            const val = document.getElementById('videoUrl').value.trim();
            const id = extractVideoID(val);
            const frame = document.getElementById('player');
            const wrap = document.getElementById('video-wrap');
            const status = document.getElementById('status');

            if (id) {
                frame.src = `https://${domain}/embed/${id}`;
                wrap.style.display = 'block';
                status.innerHTML = `✅ Playing ID: <b>${id}</b> via ${domain}`;
            } else {
                alert("Could not find a Video ID. Make sure the link looks like: ://youtube.com");
            }
        }
    </script>
</body>
</html>
