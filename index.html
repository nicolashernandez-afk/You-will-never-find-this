<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Mirror Video Player</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #0f0f0f; color: #fff; margin: 0; }
        .card { background: #1a1a1a; padding: 25px; border-radius: 12px; border: 1px solid #333; width: 90%; max-width: 750px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #444; border-radius: 6px; background: #222; color: #fff; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        button { padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .main-btn { background: #ff0000; color: white; width: 100%; margin-bottom: 10px; }
        .alt-btn { background: #444; color: #ccc; font-size: 0.8em; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        #video-wrap { margin-top: 20px; width: 100%; aspect-ratio: 16/9; display: none; background: #000; border-radius: 6px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        .status { font-size: 0.9em; margin-top: 10px; color: #aaa; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color:#ff0000">Unblocked Player</h2>
        <input type="text" id="videoUrl" placeholder="Paste YouTube link here...">
        
        <button class="main-btn" onclick="loadVideo('vid.puffyan.us')">Load Video (Mirror 1)</button>
        
        <div class="btn-group">
            <button class="alt-btn" onclick="loadVideo('invidious.nerdvpn.de')">Try Mirror 2</button>
            <button class="alt-btn" onclick="loadVideo('inv.tux.pizza')">Try Mirror 3</button>
            <button class="alt-btn" onclick="loadVideo('invidious.projectsegfau.lt')">Try Mirror 4</button>
        </div>

        <div id="video-wrap">
            <iframe id="player" allowfullscreen></iframe>
        </div>
        <p class="status" id="status">If a mirror is blocked, try another one.</p>
    </div>

    <script>
        function loadVideo(mirrorDomain) {
            const urlInput = document.getElementById('videoUrl').value.trim();
            const frame = document.getElementById('player');
            const wrap = document.getElementById('video-wrap');
            const status = document.getElementById('status');

            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/;
            const match = urlInput.match(regExp);

            if (match && match.length === 11) {
                const videoId = match[2];
                // Using the selected mirror domain instead of youtube.com
                frame.src = `https://${mirrorDomain}/embed/${videoId}`;
                wrap.style.display = 'block';
                status.innerText = "Currently using mirror: " + mirrorDomain;
            } else {
                alert("Please paste a valid YouTube link first!");
            }
        }
    </script>
</body>
</html>
