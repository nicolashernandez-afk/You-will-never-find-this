<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub YouTube Player</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; background: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 600px; text-align: center; }
        input { width: 80%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; cursor: pointer; background: #ff0000; color: white; border: none; border-radius: 5px; font-weight: bold; }
        #video-container { margin-top: 20px; width: 100%; aspect-ratio: 16/9; display: none; }
        iframe { width: 100%; height: 100%; border-radius: 5px; border: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>YouTube Video Player</h2>
        <input type="text" id="videoLink" placeholder="Paste YouTube link here (e.g., https://www.youtube.com...)">
        <br>
        <button onclick="playVideo()">Play Video</button>
        
        <div id="video-container">
            <iframe id="player" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        function playVideo() {
            const urlInput = document.getElementById('videoLink').value;
            const container = document.getElementById('video-container');
            const iframe = document.getElementById('player');
            
            // Extract Video ID from common YouTube URL formats
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = urlInput.match(regExp);

            if (match && match[2].length === 11) {
                const videoId = match[2];
                iframe.src = `https://www.youtube.com{videoId}`;
                container.style.display = 'block';
            } else {
                alert("Please enter a valid YouTube URL.");
            }
        }
    </script>

</body>
</html>
