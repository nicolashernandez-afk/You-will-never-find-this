<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocked Video Player</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #1a1a1a; color: #eee; margin: 0; }
        .box { background: #2a2a2a; padding: 30px; border-radius: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); width: 90%; max-width: 700px; text-align: center; border: 1px solid #444; }
        h2 { color: #ff4444; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #444; border-radius: 8px; background: #333; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #ff4444; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #cc0000; }
        #player-wrap { margin-top: 25px; width: 100%; aspect-ratio: 16/9; display: none; border-radius: 8px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Unblocked Player</h2>
        <p>This uses an <b>Invidious Instance</b> to bypass domain blocks.</p>
        <input type="text" id="link" placeholder="Paste YouTube link (e.g., watch?v=...)">
        <button onclick="loadVideo()">Load Video</button>
        
        <div id="player-wrap">
            <iframe id="vidFrame" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        function loadVideo() {
            const input = document.getElementById('link').value.trim();
            const frame = document.getElementById('vidFrame');
            const wrap = document.getElementById('player-wrap');

            // Extract Video ID
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|shorts\/)([^#\&\?]*).*/;
            const match = input.match(regExp);

            if (match && match[2].length === 11) {
                const videoId = match[2];
                // Using yewtu.be (a popular Invidious instance) instead of youtube.com
                frame.src = `https://yewtu.be{videoId}?autoplay=1`;
                wrap.style.display = 'block';
            } else {
                alert("Please enter a valid YouTube link.");
            }
        }
    </script>
</body>
</html>
